<section id="hero" class="hero">
  <div class="hero-overlay"></div>
  <div class="container hero-container">
    <div class="hero-content">
      <span class="hero-tag">Excelencia Odontológica</span>
      <h2 class="hero-title">Tu Salud Dental en Manos Expertas</h2>
      <p class="hero-lead">
        Bajo la dirección de la <strong>{{ config().brand.fullName }}</strong>, transformamos tu sonrisa con ética, compromiso y tecnología avanzada.
      </p>
      <div class="hero-cta">
        <a href="#treatments" class="btn btn-white">NUESTROS SERVICIOS</a>
        <a [href]="waLink()" class="btn btn-outline-white" target="_blank">CONTACTO DIRECTO</a>
      </div>
    </div>
  </div>
</section>

<section class="stats-bar">
  <div class="container">
    <div class="stats-content shadow-premium">
      <div class="stat-item">
        <span class="stat-number">20+</span>
        <span class="stat-label">Años de Trayectoria</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-number">5k+</span>
        <span class="stat-label">Pacientes Felices</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-number">100%</span>
        <span class="stat-label">Calidad y Ética</span>
      </div>
    </div>
  </div>
</section>
